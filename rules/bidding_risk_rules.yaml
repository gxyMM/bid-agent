name: "Bidding Risk Rule Base"
version: "1.0"
description: "用于标书智能体（Bid Agent）自动化审查的废标风险排查规则库"
categories:
  - id: "format_compliance"
    name: "形式审查雷区"
    rules:
      - id: "FR-01"
        name: "法人电子签与盖章要求"
        description: "检查法定代表人或授权委托人是否在所有要求的位置（投标函、法定代表人身份证明、授权委托书等）进行了签字或加盖个人印章。若是电子标，检查法人CA锁与企业CA锁是否混用，是否遗漏骑缝章。"
        type: "signature_check"
        severity: "critical"
      - id: "FR-02"
        name: "暗标违规排查"
        description: "技术暗标中不得出现能识别投标人身份的文字、Logo、排版风格或元数据（如PDF的Author或Creator属性）。"
        type: "regex_scan"
        severity: "critical"
      - id: "FR-03"
        name: "授权书效力验证"
        description: "授权委托书必须有明确且合理的授权期限，且开标日期必须处于授权期限内。"
        type: "date_logic"
        severity: "critical"
        
  - id: "qualification_compliance"
    name: "资格与合规审查雷区"
    rules:
      - id: "QC-01"
        name: "资质文件的时效性"
        description: "营业执照、资质证书、安全生产许可证等硬性资质证明在开标当日不能过期。"
        type: "date_logic"
        severity: "critical"
      - id: "QC-02"
        name: "社保证明一致性"
        description: "项目核心人员社保缴纳证明必须包含招标要求月份，且缴纳单位名称必须与投标人主体名称绝对一致（严查挂靠）。"
        type: "text_match"
        severity: "critical"

  - id: "business_compliance"
    name: "商务响应审查雷区"
    rules:
      - id: "BC-01"
        name: "投标有效期天数比对"
        description: "投标文件（投标函）中承诺的投标有效期天数，必须大于或等于招标文件要求的天数。"
        type: "numeric_compare"
        operator: ">="
        severity: "critical"
      - id: "BC-02"
        name: "整机质保期承诺核对"
        description: "提取招标文件要求的质保期限及对象。如果是整机质保，投标承诺必须覆盖'整机'，且承诺年限必须大于等于招标文件要求年限（不能只写核心部件或含糊表达）。"
        type: "numeric_compare"
        operator: ">="
        severity: "critical"
      - id: "BC-03"
        name: "交货期/工期控制"
        description: "承诺交货期天数不得大于招标文件要求的最大交货期天数，且绝对不能私自附带如'收到预付款后'等前置条件（防商务条款负偏离）。"
        type: "condition_check"
        severity: "critical"

  - id: "technical_compliance"
    name: "技术与产品响应雷区"
    rules:
      - id: "TC-01"
        name: "品牌一致性与唯一性"
        description: "同一设备不得填报多个备选品牌。必须跨文档（《报价一览表》、《详细报价单》和《技术响应表》）核对同一型号的品牌是否做到三方绝对一致。"
        type: "cross_document_match"
        severity: "critical"
      - id: "TC-02"
        name: "实质性条款（星号项）绝对响应"
        description: "带★或者是'必须/严禁'字眼的实质性条款，必须在偏离表中逐条明确列出，并强制标明'无偏离'或'正偏离'。"
        type: "keyword_check"
        severity: "critical"
      - id: "TC-03"
        name: "支撑性证明材料缺失或不符"
        description: "技术参数响应为'满足'时，必须验证是否附带对应的第三方检测报告或认证文件，且附件被测型号必须与投标设备型号一个字母都不差。"
        type: "attachment_verify"
        severity: "critical"

  - id: "anti_collusion"
    name: "查重与防串标雷区"
    rules:
      - id: "AC-01"
        name: "文件属性重合度（机器特征码排查）"
        description: "检查投标文件的PDF/Word创建者（Author）、最后修改者属性及底层硬件MAC特征码，排查因同台电脑制作造成的串标风险。"
        type: "metadata_check"
        severity: "warning"
      - id: "AC-02"
        name: "张冠李戴（历史遗留词汇扫描）"
        description: "全文强制扫描其他项目名称、其他招标方名称，排查因复制粘贴上一套历史标书而产生的错漏和直接废标风险。"
        type: "regex_scan"
        severity: "critical"
